name: Auto Open PR

on:
  push:
    branches-ignore:
      - main
      - gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  open-draft-pr:
    name: open-draft-pr
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'

    steps:
      - name: Ensure pull request exists
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${context.ref.replace('refs/heads/', '')}`;
            const branch = context.ref.replace('refs/heads/', '');

            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base: "main"
            });

            if (pullRequests.length > 0) {
              core.info(`Open PR already exists for ${branch}.`);
              return;
            }

            const title = branch
              .replace(/[-_]+/g, " ")
              .replace(/\b\w/g, (char) => char.toUpperCase());

            const body = [
              "## Summary",
              "",
              `Auto-created draft PR for branch \`${branch}\`.`,
              "",
              "## Validation",
              "",
              "- [ ] `npm run build`",
              "- [ ] `npm test`",
              "- [ ] Checked responsive behavior if UI changed",
              "",
              "## Checklist",
              "",
              "- [ ] Ready for review",
              "- [ ] Keeps GitHub Pages compatibility intact",
              "- [ ] No unnecessary scope creep"
            ].join("\n");

            const { data: pullRequest } = await github.rest.pulls.create({
              owner,
              repo,
              head: branch,
              base: "main",
              title: `WIP: ${title || branch}`,
              body,
              draft: true
            });

            core.info(`Created draft PR #${pullRequest.number} for ${branch}.`);
